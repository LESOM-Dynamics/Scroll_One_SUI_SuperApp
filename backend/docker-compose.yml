version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scroll_one_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-scroll_one}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scroll_one_network

  redis:
    image: redis:7-alpine
    container_name: scroll_one_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - scroll_one_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scroll_one_backend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-scroll_one}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      SCROLL_RPC_URL: ${SCROLL_RPC_URL}
      SCROLL_TESTNET_RPC_URL: ${SCROLL_TESTNET_RPC_URL}
      SCROLLSCAN_API_KEY: ${SCROLLSCAN_API_KEY}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - scroll_one_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  scroll_one_network:
    driver: bridge

